<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>TD2 Timetable Overlay</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: sans-serif;
      color: white;
    }

    #container {
      width: 600px;
      height: 50px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    #progress-bar {
      height: 100%;
      background: limegreen;
      width: 0%;
      transition: width 1s, background-color 0.5s;
    }

    .vehicle {
      position: absolute;
      top: 5px;
      width: 119px;
      height: 40px;
      transition: left 1s;
    }

    #info {
      width: 600px;
      text-align: center;
      margin-top: 4px;
      font-size: 28px;
      text-shadow: 0 0 5px black;
    }
  </style>
</head>
<body>

  <div id="container">
    <div id="progress-bar"></div>
    <div id="train-images"></div>
  </div>
  <div id="info">Lade Fahrplan...</div>

  <script>
    const config = {
      username: "BravuraLion", // TD2-Name
      language: "de"
    };

    const texts = {
      de: {
        loading: "Lade Fahrplan...",
        none: "Kein Fahrplan gefunden.",
        error: "Fehler beim Laden!",
        finished: (dist, delayText) => `Fahrplan abgeschlossen (${dist} km) | Verspätung: ${delayText}`,
        progress: (curr, total, delayText) => `${curr} km von ${total} km | Verspätung: ${delayText}`,
        delayUnknown: "k.A."
      },
      en: {
        loading: "Loading timetable...",
        none: "No timetable found.",
        error: "Error loading data!",
        finished: (dist, delayText) => `Timetable completed (${dist} km) | Delay: ${delayText}`,
        progress: (curr, total, delayText) => `${curr} km of ${total} km | Delay: ${delayText}`,
        delayUnknown: "n/a"
      }
    };

    const API_URL = `https://stacjownik.spythere.eu/api/getTimetables?driverName=${config.username}`;
    const bar = document.getElementById("progress-bar");
    const info = document.getElementById("info");
    const trainImages = document.getElementById("train-images");
    const containerWidth = 600;
    const vehicleWidth = 119;
    const vehicleGap = 1;


    function parseApiDate(value) {
      if (!value || typeof value !== "string") {
        return null;
      }

      if (value.startsWith("1970-01-01")) {
        return null;
      }

      const ts = Date.parse(value);
      return Number.isFinite(ts) ? ts : null;
    }

    function formatDelay(minutes) {
      const rounded = Math.round(minutes);
      const sign = rounded > 0 ? "+" : "";
      return `${sign}${rounded} min`;
    }

    function resolveDelay(plan) {
      const index = Math.max((Number(plan.confirmedStopsCount) || 1) - 1, 0);

      const actualArrival = parseApiDate(plan.checkpointArrivals?.[index]);
      const schedArrival = parseApiDate(plan.checkpointArrivalsScheduled?.[index]);
      const actualDeparture = parseApiDate(plan.checkpointDepartures?.[index]);
      const schedDeparture = parseApiDate(plan.checkpointDeparturesScheduled?.[index]);

      if (actualDeparture !== null && schedDeparture !== null) {
        return formatDelay((actualDeparture - schedDeparture) / 60000);
      }

      if (actualArrival !== null && schedArrival !== null) {
        return formatDelay((actualArrival - schedArrival) / 60000);
      }

      const beginActual = parseApiDate(plan.beginDate);
      const beginScheduled = parseApiDate(plan.scheduledBeginDate);
      if (beginActual !== null && beginScheduled !== null) {
        return formatDelay((beginActual - beginScheduled) / 60000);
      }

      return null;
    }

    async function update() {
      const t = texts[config.language] || texts["en"];
      console.log("Update gestartet");

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        console.log("API Response:", data);

        if (!Array.isArray(data) || data.length === 0) {
          info.textContent = t.none;
          console.warn("Keine Daten gefunden.");
          return;
        }

        const plan = data[0];
        const distance = parseFloat(plan.routeDistance);
        const progress = parseFloat(plan.currentDistance);
const vehicles = plan.stockString
  ? plan.stockString.split(";").map(v => v.trim().split(":")[0])
  : [];


        console.log("Fahrzeuge:", vehicles);
        console.log("Strecke:", progress, "/", distance);

        if (isNaN(distance) || isNaN(progress)) {
          info.textContent = t.error;
          console.error("Ungültige Streckendaten!");
          return;
        }

        // Progressbar-Update
        const percent = Math.min((progress / distance) * 100, 100);
        bar.style.width = `${percent}%`;
        const hue = percent * 1.2;
        bar.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;

        // Fahrzeugbilder neu generieren
        trainImages.innerHTML = ""; 

let offsetIndex = 0;

vehicles.forEach((fullId) => {
  const isSingleUnit = /^EN(57|71)-\d+$/i.test(fullId);
  const isDoubleUnit = /^2EN(57|71)-\d+\+\d+$/i.test(fullId);

  if (isDoubleUnit) {
    const match = fullId.match(/^2(EN(57|71))-(\d+)\+(\d+)$/i);
    if (match) {
      const type = match[1]; // EN57 oder EN71
      const id1 = match[3];
      const id2 = match[4];
      const unitIds = [`${type}-${id1}`, `${type}-${id2}`];

      unitIds.forEach(unit => {
        ["rb", "s", "ra"].forEach(suffix => {
          const partId = `${unit}${suffix}`;
          const img = document.createElement("img");
          img.className = "vehicle";
          img.src = `https://stacjownik.spythere.eu/static/thumbnails/${partId}.png`;
          img.style.left = `${(bar.offsetWidth - (offsetIndex + 1) * (vehicleWidth + vehicleGap))}px`;
          img.onerror = () => {
            console.warn("Bild nicht gefunden:", img.src);
            img.style.display = 'none';
          };
          trainImages.appendChild(img);
          offsetIndex++;
        });
      });
    }
  } else if (isSingleUnit) {
    ["rb", "s", "ra"].forEach(suffix => {
      const partId = `${fullId}${suffix}`;
      const img = document.createElement("img");
      img.className = "vehicle";
      img.src = `https://stacjownik.spythere.eu/static/thumbnails/${partId}.png`;
      img.style.left = `${(bar.offsetWidth - (offsetIndex + 1) * (vehicleWidth + vehicleGap))}px`;
      img.onerror = () => {
        console.warn("Bild nicht gefunden:", img.src);
        img.style.display = 'none';
      };
      trainImages.appendChild(img);
      offsetIndex++;
    });
  } else {
    const img = document.createElement("img");
    img.className = "vehicle";
    img.src = `https://stacjownik.spythere.eu/static/thumbnails/${fullId}.png`;
    img.style.left = `${(bar.offsetWidth - (offsetIndex + 1) * (vehicleWidth + vehicleGap))}px`;
    img.onerror = () => {
      console.warn("Bild nicht gefunden:", img.src);
      img.style.display = 'none';
    };
    trainImages.appendChild(img);
    offsetIndex++;
  }
});



        const delayText = resolveDelay(plan) || t.delayUnknown;

        const done = progress >= distance;
        info.textContent = done
          ? t.finished(progress.toFixed(1), delayText)
          : t.progress(progress.toFixed(1), distance.toFixed(1), delayText);

      } catch (e) {
        console.error("💥 API-Fehler:", e);
        info.textContent = texts[config.language].error;
      }
    }

    setInterval(update, 5000);
    update();
  </script>
</body>
</html>
